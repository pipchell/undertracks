<!DOCTYPE HTML>
<html>
	<head>
		<title>Undertracks - Contact</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
		<link rel="icon" href="/images/favicon.png" type="image/png" sizes="48x48">
	</head>
	<body class="is-preload">

		<!-- Wrapper -->
			<div id="wrapper">

				<!-- Header -->
					<header id="header">
						<a href="index.html" class="logo">Undertracks</a>
					</header>

				<!-- Nav -->
					<nav id="nav">
						<ul class="links">
							<li><a href="">Home</a></li>
							<li class="active"><a href="contact">Contact</a></li>
							<li><a href="elements.html">Extras</a></li>
						</ul>
					</nav>

				<!-- Main -->
					<div id="main">

						<!-- Post -->
							<section class="post">
								<header class="major">
									<h1>Contact Us</h1>
									<p>I don't realy know why you would want to,  but...</p>
								</header>
								<div class="image main"><img src="images/undertracks-original.png" alt="The Undertracks railway sign" /></div>
								<p>You can either email us,  or use this handy contact form.</p>
							</section>

					</div>

				<!-- Footer -->
					<footer id="footer" style="padding: 10px;">
					<form action="https://formspree.io/f/mrekvapr" method="POST" id="contact-form" enctype="multipart/form-data">
						<div class="row gtr-uniform">
							<div class="col-6 col-12-xsmall">
								<label for="name">Name</label>
								<input type="text" id="name" name="name" placeholder="Your name" required aria-label="Your Name">
							</div>
							<div class="col-6 col-12-xsmall">
								<label for="email">Email</label>
								<input type="email" id="email" name="_replyto" placeholder="your.email@example.com" required aria-label="Your Email Address">
							</div>
							<div class="col-12">
								<label for="message">Message</label>
								<textarea id="message" name="message" placeholder="Your message..." rows="6" required style="resize: none;" aria-label="Leave A Message"></textarea>
							</div>
							<div class="col-12">
								<ul class="actions special">
									<li><button type="submit" class="button primary" aria-label="Send Message">Send Message</button></li>
								</ul>
							</div>
						</div>
					</form>

						
						<section class="split contact">
							<section class="alt">
								<h3>Email</h3>
								<p><a href="#">hi@undertracks.co.uk</a></p>
							</section>
						</section>
					</footer>

				<!-- Copyright -->
					<div id="copyright">
						<ul><li>&copy; Undertracks</li><li>Design: <a href="https://pipchell.com">Pip</a></li></ul>
					</div>

			</div>

		<!-- Scripts -->
			<script src="assets/js/jquery.min.js"></script>
			<script src="assets/js/jquery.scrollex.min.js"></script>
			<script src="assets/js/jquery.scrolly.min.js"></script>
			<script src="assets/js/browser.min.js"></script>
			<script src="assets/js/breakpoints.min.js"></script>
			<script src="assets/js/util.js"></script>
			<script src="assets/js/main.js"></script>

	</body>
</html>
